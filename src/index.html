<!DOCTYPE html>
<html>
<head>
  <title>Custom WS Proxy</title>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #bar { padding: 10px; background: #222; color: #fff; display: flex; gap: 10px; align-items: center; }
    #url-input { flex-grow: 1; padding: 8px; font-size: 16px; border-radius: 4px; border: none; }
    button { padding: 8px 15px; font-size: 16px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; }
    #frame { flex-grow: 1; border: none; width: 100%; background: #fff; }
  </style>
</head>
<body>
  <div id="bar">
    <strong>SW Proxy</strong>
    <input type="text" id="url-input" placeholder="wikipedia.org" value="wikipedia.org" />
    <button onclick="loadUrl()">Go</button>
    <button id="downloadLogsBtn" style="padding: 10px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
  Download Debug Logs
</button>

<script>
  // The Download Logic
  document.getElementById('downloadLogsBtn').addEventListener('click', () => {
    if (window.appLogs.length === 0) {
      alert("No logs captured yet!");
      return;
    }

    // Join all logs with a newline
    const logText = window.appLogs.join('\n');
    
    // Create a Blob (a file-like object)
    const blob = new Blob([logText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    
    // Create a temporary hidden link to trigger the download
    const a = document.createElement('a');
    a.href = url;
    a.download = `proxy-logs-${new Date().getTime()}.txt`;
    document.body.appendChild(a);
    a.click();
    
    // Cleanup
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
</script>
  </div>
<iframe allow="pointer-lock; keyboard-map;" tabindex="0" style="width: 100%; height: 100%; border: none;" id="frame"></iframe>
<script>
  ;(function () {
    var src = '//cdn.jsdelivr.net/npm/eruda';
    if (!/eruda=true/.test(window.location.search) && localStorage.getItem('active-eruda') !== 'true') return;
    
    console.log('[Client] Injecting Eruda DevTools...');
    var script = document.createElement('script');
    script.src = src;
    script.onload = function () { 
      eruda.init(); 
      console.log('[Client] Eruda initialized successfully.');
    };
    document.head.appendChild(script);
  })();
  </script>
  <script>
    // LISTEN FOR LOGS FROM THE SERVICE WORKER AND PIPE TO ERUDA
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'sw-log') {
        console.log(event.data.message);
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(() => console.log('[Client] Service Worker registered.'))
        .catch(err => console.error('[Client] SW Error:', err));
    }

    function loadUrl() {
      const input = document.getElementById('url-input').value;
      const frame = document.getElementById('frame');
      console.log('[Client] Loading iframe with target:', input);
      frame.src = '/service/' + encodeURIComponent(input); 
    }
  </script>
  <script>
  // 1. Create an array to hold all our log lines
  window.appLogs = [];

  // Helper to add a timestamped log to our array
  function captureLog(source, message) {
    const timestamp = new Date().toISOString().split('T')[1].replace('Z', '');
    window.appLogs.push(`[${timestamp}] [${source}] ${message}`);
  }

  // 2. Intercept messages from the Service Worker
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data && event.data.type === 'sw-log') {
      captureLog('SW/Server', event.data.message);
    }
  });

  // 3. (Optional) Hijack standard console.log to catch anything else
  const originalConsoleLog = console.log;
  console.log = function(...args) {
    // Call the original so Eruda still sees it
    originalConsoleLog.apply(console, args); 
    
    // Convert objects to strings and capture
    const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
    captureLog('Client', msg);
  };
</script>
</body>
</html>
