name = "websocket-proxy-proof-of-concept"
main = "src/index.js"
compatibility_date = "2026-03-12"

[[rules]]
type = "Text"
globs = ["**/*.html", "**/sw.js"]
[durable_objects]
bindings = [
  { name = "WSPROXY", class_name = "WebSocketProxy" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketProxy"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true